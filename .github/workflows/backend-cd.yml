name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

permissions:
  contents: write
  packages: write

jobs:
  backend-cd:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/ahmednasser04/kubeshort-backend:latest
            ghcr.io/ahmednasser04/kubeshort-backend:${{ github.sha }}

      - name: Update Kubernetes deployment manifest
        run: |
          sed -i "s|image: ghcr.io/ahmednasser04/kubeshort-backend:.*|image: ghcr.io/ahmednasser04/kubeshort-backend:${GITHUB_SHA}|" \
            ../k8s/backend/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cd ..

          git add k8s/backend/deployment.yaml
          git commit -m "ci: update backend image to ${GITHUB_SHA}" || exit 0
          git push
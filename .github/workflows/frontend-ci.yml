name: Frontend CI


on:
  push:
    branches:
      - main
    paths:
        - 'frontend/**'

            
permissions:
  contents: write
  packages: write


jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
        run:
            working-directory: frontend
    steps:
        -   name: Checkout repository
            uses: actions/checkout@v4
        
        -   name: Set up Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '22'
                cache: 'npm'
                cache-dependency-path: frontend/package-lock.json

        -   name: Install dependencies
            run: npm install

        -   name: Run ESLint
            run: npm run lint

        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
        
        -   name: Login to GHCR
            uses: docker/login-action@v3
            with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

        -   name: Build and push Docker image
            uses: docker/build-push-action@v6
            with:
                context: ./frontend
                push: true
                tags: |
                    ghcr.io/ahmednasser04/kubeshort-frontend:latest
                    ghcr.io/ahmednasser04/kubeshort-frontend:${{ github.sha }}


        -   name: Update Kubernetes deployment manifest
            run: |
                sed -i "s|image: ghcr.io/ahmednasser04/kubeshort-frontend:.*|image: ghcr.io/ahmednasser04/kubeshort-frontend:${GITHUB_SHA}|" \
                ../k8s/frontend/deployment.yaml

        -   name: Commit and push manifest
            run: |
                git config --global user.name "github-actions[bot]"
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

                cd ..

                git add k8s/frontend/deployment.yaml
                git commit -m "ci: update frontend image to ${GITHUB_SHA}" || exit 0
                git push